# docker-compose.yml — GCF Talk AI Bot (ExApp, manual-install deploy)
#
# Deploy model: AppAPI's "manual-install" daemon. AppAPI does NOT build or
# start this container — the operator does (docker compose up -d), then runs
# `occ app_api:app:register` so AppAPI can reach /heartbeat, /init, /enabled.
#
# All secrets come from a sibling .env file (NOT committed — see .gitignore).
# .env.example documents the required keys.

services:
  gcf-talk-ai-bot:
    build: .
    image: gcf-talk-ai-bot:latest
    container_name: gcf-talk-ai-bot
    restart: unless-stopped

    # Joined to the shared stack network so the bot resolves
    # `nextcloud-nextcloud-1` by DNS, and Talk/AppAPI reach the bot by
    # its container_name. No `ports:` block on purpose — the bot is never
    # published to the host; all traffic stays inside vps2DockerNet.
    networks:
      - vps2DockerNet

    expose:
      - "8080"

    environment:
      # --- Infra vars (AppAPI injects these in docker-install; here we
      #     provide them ourselves because the daemon is manual-install) ---
      - APP_ID=gcf_talk_ai_bot
      - APP_VERSION=0.1.0
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - APP_SECRET=${APP_SECRET:?APP_SECRET is required - see .env}
      - NEXTCLOUD_URL=http://nextcloud-nextcloud-1
      # nc_py_api reads this; AppAPI normally sets it. Keep in sync with the
      # AppAPI version reported by `occ app:list` (app_api: 32.0.0).
      - AA_VERSION=32.0.0
      - APP_PERSISTENT_STORAGE=/data

      # --- Application vars (yours) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required - see .env}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - BOT_DISPLAY_NAME=${BOT_DISPLAY_NAME:-GCF AI Bot}
      - BOT_MENTION_NAME=${BOT_MENTION_NAME:-IA}
      - BOT_DESCRIPTION=${BOT_DESCRIPTION:-AI-powered assistant using OpenAI ChatGPT.}

      # --- Fase 2: RAG -----------------------------------------------------
      # El bot (ruta de petición) solo necesita el vector store + la key para
      # embeber la query. Supabase solo lo usa la CLI de ingestión.
      - PGVECTOR_DSN=${PGVECTOR_DSN:-postgresql://rag:${PGVECTOR_PASSWORD:?PGVECTOR_PASSWORD is required - see .env}@gcf-talk-ai-pgvector:5432/rag}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - RAG_TOP_K=${RAG_TOP_K:-4}
      - RAG_SIMILARITY_THRESHOLD=${RAG_SIMILARITY_THRESHOLD:-0.75}
      - RAG_DEFAULT_ROLE_SCOPE=${RAG_DEFAULT_ROLE_SCOPE:-corporate}
      # Solo necesarias si se ejecuta `python -m app.ingest` dentro de este
      # contenedor; el corpus es READ-ONLY (anon key). Fuente = tabla-catálogo
      # `documents` (ADR-006-ter). RAG_INGEST_LEVELS filtra por access_level.
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - RAG_INGEST_LEVELS=${RAG_INGEST_LEVELS:-noroot}
      # DEPRECADO (ADR-006-ter): el corpus ya no vive en un bucket; sin efecto.
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-}

    depends_on:
      - pgvector

    # Persistent storage volume nc_py_api expects (APP_PERSISTENT_STORAGE).
    volumes:
      - gcf_talk_ai_bot_data:/data

    # Mirrors the HEALTHCHECK in the Dockerfile; compose-level copy makes the
    # health state visible in `docker compose ps` without inspecting.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/heartbeat"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Vector store dedicado de la Fase 2 (ADR-007). Externo al Postgres de Chat
  # IA. Imagen pgvector/pgvector:pg16. NO se publica al host (sin `ports:`):
  # todo el tráfico vive dentro de vps2DockerNet, igual que el bot.
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: gcf-talk-ai-pgvector
    restart: unless-stopped
    networks:
      - vps2DockerNet
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${PGVECTOR_DB:-rag}
      - POSTGRES_USER=${PGVECTOR_USER:-rag}
      - POSTGRES_PASSWORD=${PGVECTOR_PASSWORD:?PGVECTOR_PASSWORD is required - see .env}
    volumes:
      - gcf_pgvector_data:/var/lib/postgresql/data
      # Migración inicial: docker-entrypoint la ejecuta una sola vez, al
      # inicializar un volumen de datos vacío. Re-aplicarla manualmente si el
      # volumen ya existía (ver pasos del operador en ARCHITECTURE.md).
      - ./migrations/0001_pgvector_init.sql:/docker-entrypoint-initdb.d/0001_pgvector_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-rag} -d ${PGVECTOR_DB:-rag}"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  # External: created and owned by the nginxproxymanager compose project.
  # We attach to it, we do not define or manage it.
  vps2DockerNet:
    external: true

volumes:
  gcf_talk_ai_bot_data:
  gcf_pgvector_data: